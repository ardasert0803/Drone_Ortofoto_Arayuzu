

services:

  nodeodm:

    image: opendronemap/nodeodm:gpu

    container_name: sc-nodeodm

    restart: unless-stopped

    ports:

      - "3000:3000"

    volumes:

      - nodeodm-data:/var/www/data

      - ../data/uploads:/host_uploads:ro

    environment:

      NVIDIA_VISIBLE_DEVICES: ${NODEODM_GPU_DEVICE:-all}

      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    command:

      - "--max_concurrency"

      - "2"

      - "--max_images"

      - "0"

      - "--options"

      - '[{"name":"3d-tiles","value":true},{"name":"build-overviews","value":true}]'



    deploy:

      resources:

        reservations:

          devices:

            - driver: nvidia

              count: all

              capabilities: [gpu]



  py3dtiles:

    image: py3dtiles/py3dtiles:latest

    container_name: sc-py3dtiles

    restart: "no"

    profiles: ["tools"]
    volumes:

      - ../data/outputs:/data


volumes:

  nodeodm-data:
